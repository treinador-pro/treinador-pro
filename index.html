<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Treinador PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; padding:20px; background:#111; color:#fff; }
button { padding:10px; margin:5px; }
input, select { padding:8px; margin:5px; }
</style>

</head>

<body>

<h2>🏋️ Treinador PRO</h2>

<select id="grupo">
<option value="A">Treino A</option>
<option value="B">Treino B</option>
<option value="C">Treino C</option>
</select>

<br>

<button onclick="iniciar()">INICIAR</button>
<button onclick="continuar()">CONTINUAR</button>
<button onclick="resetar()">RESET</button>

<h3 id="status"></h3>

<hr>

<h3>Registrar</h3>

<select id="ex">
<option value="barra">Barra</option>
<option value="paralela">Paralela</option>
<option value="supino">Supino</option>
<option value="ombro">Ombro</option>
<option value="puxada">Costas</option>
<option value="perna">Pernas</option>
</select>

<br>

<input id="r1" placeholder="S1">
<input id="r2" placeholder="S2">
<input id="r3" placeholder="S3">

<br>

<input id="peso" placeholder="Peso">

<br>

<select id="dif">
<option value="1">Fácil</option>
<option value="2">Leve</option>
<option value="3">Médio</option>
<option value="4">Difícil</option>
<option value="5">Falha</option>
</select>

<br>

<button onclick="registrar()">REGISTRAR</button>
<button onclick="imprimir()">IMPRIMIR</button>

<h3 id="saida"></h3>

<script>

// ===== BANCO =====
let db = JSON.parse(localStorage.getItem("db")) || {};
let treino = JSON.parse(localStorage.getItem("treino")) || [];

// ===== EXERCÍCIOS =====
const VAR = {

barra:["pronada_aberta","pronada_media","pronada_fechada","supinada_aberta","supinada_media","supinada_fechada"],

paralela:["peito","triceps","peso","pernas_elevadas"],

supino:["halter_reto","halter_inclinado","halter_lento"],

ombro:["lateral_halter","frontal_halter","frontal_barra"],

puxada:["remada_barra","terra","sumo"],

perna:["agachamento","agachamento_pausado","agachamento_lento"]

};

// ===== VARIAÇÃO =====
function prox(grupo){
if(!db[grupo]) db[grupo]={i:0,peso:0};
let v = VAR[grupo][db[grupo].i % VAR[grupo].length];
db[grupo].i++;
return v;
}

// ===== PROGRESSÃO =====
function calc(grupo,reps,peso,dif){

if(!db[grupo]) db[grupo]={peso:peso||0,i:0};

let min = Math.min(...reps);
let base = db[grupo];

let novoPeso = base.peso;
let acao, series;

if(dif>=4){
acao="REDUZIR";
novoPeso = Math.max(0, base.peso-1);
series=[8,7,6];
}
else if(dif==3){
acao="MANTER";
series=[10,9,8];
}
else{
if(min>=10){
acao="SUBIR PESO";
novoPeso += (grupo=="supino"?1:2);
series=[10,9,8];
}else{
acao="SUBIR REP";
series=[11,10,9];
}
}

base.peso=novoPeso;

let v = prox(grupo);

return {grupo,variacao:v,peso:novoPeso,acao,series};

}

// ===== REGISTRAR =====
function registrar(){

let g = ex.value;
let reps=[+r1.value,+r2.value,+r3.value];
let peso = +document.getElementById("peso").value||0;
let dif = +document.getElementById("dif").value;

let r = calc(g,reps,peso,dif);

treino.push(r);

salvar();
mostrar();

}

// ===== MOSTRAR =====
function mostrar(){

let html="PRÓXIMO TREINO:<br><br>";

treino.forEach(t=>{
html+=`${t.variacao}<br>${t.acao}<br>Peso:${t.peso}<br>Séries:${t.series.join(",")}<br><br>`;
});

saida.innerHTML=html;
status.innerHTML="Exercícios hoje: "+treino.length;

}

// ===== SALVAR =====
function salvar(){
localStorage.setItem("db",JSON.stringify(db));
localStorage.setItem("treino",JSON.stringify(treino));
}

// ===== CONTINUAR =====
function continuar(){ mostrar(); }

// ===== RESET =====
function resetar(){
localStorage.clear();
db={};
treino=[];
mostrar();
}

// ===== INICIAR =====
function iniciar(){

treino=[];

let g = grupo.value;

if(g=="A"){
treino.push(calc("supino",[10,9,8],10,2));
treino.push(calc("ombro",[10,9,8],6,2));
treino.push(calc("paralela",[10,9,8],0,2));
}

if(g=="B"){
treino.push(calc("barra",[10,9,8],0,2));
treino.push(calc("puxada",[10,9,8],20,2));
}

if(g=="C"){
treino.push(calc("perna",[10,9,8],30,2));
}

salvar();
mostrar();

}

// ===== IMPRIMIR =====
function imprimir(){
let t="TREINO\n\n";
treino.forEach(x=>{
t+=`${x.variacao}\nPeso:${x.peso}\nSéries:${x.series.join(",")}\n\n`;
});
let w=window.open();
w.document.write("<pre>"+t+"</pre>");
w.print();
}

// ===== PWA =====
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

mostrar();

</script>

</body>
</html>
